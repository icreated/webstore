<div class="panel panel-default">
  <div class="panel-heading">
    <h3 class="panel-title"><strong>{{address.name}}</strong></h3>
  </div>
  <div class="panel-body">
    <ul class="list-inline">
      <li>{{address.location?.address1}}</li>
      <li>{{address.location?.address2}}</li>
      <li>{{address.location?.postal}} {{address.location?.city}}</li>
      <li>{{address.location?.country?.name}}</li>
      @if (!address.location?.address2) {
        <li>&nbsp;</li>
      }
    </ul>
  </div>
  <div class="panel-footer">
    @for (action of actions; track action) {
      <button (click)="onClick(action)" class="btn btn-sm me-2 {{action.buttonClass}}"><i class="fa {{action.icon}} me-2"></i>{{action.label}}</button>
    }
  </div>
</div>
