<div class="page-breadcrumb">
  <div class="container">
    <nav class="breadcrumb-nav">
      <a [routerLink]="['/']"><i class="fa fa-home"></i></a>
      <span class="breadcrumb-sep">/</span>
      <a [routerLink]="['/account']">Account</a>
      <span class="breadcrumb-sep">/</span>
      <span>Personal info</span>
    </nav>
  </div>
</div>

<div class="container page-body">

  <div class="page-header">
    <h1 class="page-title"><i class="fa fa-user me-2"></i>Personal information</h1>
  </div>

  <form [formGroup]="accountForm" (submit)="save(accountForm.value)">
    <div class="form-card">
      <div class="form-card__header">
        <i class="fa fa-id-card me-2"></i>Your details
      </div>
      <div class="form-card__body">

        <p class="form-note"><sup class="text-danger">*</sup> Required fields</p>

        <div class="form-group">
          <label class="form-label" for="name">Full name <sup>*</sup></label>
          @if (accountForm.controls) {
            <app-control-messages [control]="accountForm.controls.name"></app-control-messages>
          }
          <input id="name" name="name" formControlName="name" type="text"
            class="form-control" placeholder="First and last name" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="InputInfoEmail">Email <sup>*</sup></label>
          @if (accountForm.controls) {
            <app-control-messages [control]="accountForm.controls.email"></app-control-messages>
          }
          <input id="InputInfoEmail" name="email" formControlName="email" type="email"
            class="form-control" placeholder="your@email.com" required>
        </div>

      </div>
      <div class="form-card__footer">
        <button type="submit" class="btn btn-primary" [disabled]="!accountForm.valid">
          <i class="fa fa-save me-2"></i>Save changes
        </button>
      </div>
    </div>
  </form>

</div>
