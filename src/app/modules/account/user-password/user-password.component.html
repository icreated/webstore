<div class="page-breadcrumb">
  <div class="container">
    <nav class="breadcrumb-nav">
      <a [routerLink]="['/']"><i class="fa fa-home"></i></a>
      <span class="breadcrumb-sep">/</span>
      <a [routerLink]="['/account']">Account</a>
      <span class="breadcrumb-sep">/</span>
      <span>Password</span>
    </nav>
  </div>
</div>

<div class="container page-body">

  <div class="page-header">
    <h1 class="page-title"><i class="fa fa-lock me-2"></i>Change password</h1>
  </div>

  @if (active()) {
    <form [formGroup]="passwordForm" (submit)="save(passwordForm.value)">
      <div class="form-card">
        <div class="form-card__header">
          <i class="fa fa-shield me-2"></i>Security
        </div>
        <div class="form-card__body">

          <p class="form-note"><sup class="text-danger">*</sup> Required fields</p>

          <div class="form-group">
            <label class="form-label" for="InputPasswordCurrent">Current password <sup>*</sup></label>
            <app-control-messages [control]="passwordForm.controls.password"></app-control-messages>
            <input id="InputPasswordCurrent" name="password" formControlName="password"
              type="password" class="form-control" autocomplete="current-password" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="InputPasswordNew">New password <sup>*</sup></label>
            <app-control-messages [control]="passwordForm.controls.newPassword"></app-control-messages>
            <input id="InputPasswordNew" name="newPassword" formControlName="newPassword"
              type="password" class="form-control" autocomplete="new-password" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="InputPasswordConfirm">Confirm new password <sup>*</sup></label>
            <app-control-messages [control]="passwordForm.controls.confirmPassword"></app-control-messages>
            <input id="InputPasswordConfirm" name="confirmPassword" formControlName="confirmPassword"
              type="password" class="form-control" autocomplete="new-password" required>
          </div>

        </div>
        <div class="form-card__footer">
          <button type="submit" class="btn btn-primary" [disabled]="!passwordForm.valid">
            <i class="fa fa-save me-2"></i>Update password
          </button>
        </div>
      </div>
    </form>
  }

</div>
