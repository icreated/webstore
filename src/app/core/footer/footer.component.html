<footer class="site-footer">
  <div class="site-footer__main">
    <div class="container">
      <div class="row g-4 g-lg-5">

        <!-- Brand & Contact -->
        <div class="col-lg-4 col-md-6">
          <div class="footer-brand">
            <i class="fa fa-leaf footer-brand__icon"></i>
            <span class="footer-brand__name">WebStore</span>
          </div>
          <p class="footer-tagline">Quality garden products for every green thumb.</p>
          <ul class="footer-contact">
            <li>
              <a href="callto:0101010101">
                <i class="fa fa-phone"></i>
                <span>01 01 01 01 01</span>
              </a>
            </li>
            <li>
              <a href="mailto:{{email}}">
                <i class="fa fa-envelope-o"></i>
                <span>{{email}}</span>
              </a>
            </li>
          </ul>
        </div>

        <!-- Categories -->
        <div class="col-lg-2 col-md-3 col-6">
          <h5 class="footer-heading">Shop</h5>
          <ul class="footer-links">
            @for (item of categories(); track item) {
              <li>
                <a [routerLink]="['/catalog', item.id]">{{ item.name }}</a>
              </li>
            }
          </ul>
        </div>

        <!-- Account -->
        <div class="col-lg-2 col-md-3 col-6">
          <h5 class="footer-heading">Account</h5>
          <ul class="footer-links">
            <li><a [routerLink]="['/account']">My Account</a></li>
            <li><a [routerLink]="['/account/addresses']">Addresses</a></li>
            <li><a [routerLink]="['/account/orders']">Orders</a></li>
          </ul>
        </div>

      </div>
    </div>
  </div>

  <div class="site-footer__bottom">
    <div class="container">
      <p class="footer-copy">&copy; Icreated 2026 — Open-source webstore for iDempiere ERP</p>
    </div>
  </div>
</footer>
